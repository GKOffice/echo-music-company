version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: echo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: echo
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo -d echo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: echo_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-melodio_redis_2026} --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-melodio_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: echo_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://echo:echo_dev@postgres:5432/echo
      REDIS_URL: redis://:${REDIS_PASSWORD:-melodio_redis_2026}@redis:6379
      ENVIRONMENT: development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: echo_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    env_file:
      - .env
    depends_on:
      - api

  agents:
    build:
      context: ./apps/agents
      dockerfile: Dockerfile
    container_name: echo_agents
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://echo:echo_dev@postgres:5432/echo
      REDIS_URL: redis://:${REDIS_PASSWORD:-melodio_redis_2026}@redis:6379
      ENVIRONMENT: development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/agents:/app

volumes:
  postgres_data:
  redis_data:
